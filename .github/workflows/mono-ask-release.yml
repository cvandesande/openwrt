name: Mono ASK Release Build

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Annotated candidate tag to build and publish as a GitHub pre-release."
        required: true
        default: "mono-ask-v25.12.3-r1"
        type: string
      version_number:
        description: "Image release number embedded in /etc/openwrt_release."
        required: true
        default: "25.12.3-mono1"
        type: string
      version_code:
        description: "Image release code embedded in /etc/openwrt_version."
        required: true
        default: "mono-ask-v25.12.3-r1"
        type: string
      cache_epoch:
        description: "Optional cache epoch override. Leave empty to use MONO_RELEASE_CACHE_EPOCH or v1."
        required: false
        type: string
      cold_build:
        description: "Skip restoring and saving caches for this run."
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  build-and-publish:
    name: Build and publish
    uses: ./.github/workflows/mono-ask-build-publish.yml
    permissions:
      contents: write
      actions: read
    with:
      release_tag: ${{ inputs.release_tag }}
      version_number: ${{ inputs.version_number }}
      version_code: ${{ inputs.version_code }}
      cache_epoch: ${{ inputs.cache_epoch }}
      cold_build: ${{ inputs.cold_build }}
