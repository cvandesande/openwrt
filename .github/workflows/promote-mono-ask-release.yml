name: Promote Mono ASK Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing Mono ASK pre-release tag to promote."
        required: true
        default: "mono-ask-v25.12.3-r1"
        type: string

permissions:
  contents: read

concurrency:
  group: promote-mono-ask-release-${{ inputs.release_tag }}
  cancel-in-progress: false

jobs:
  promote-release:
    name: Promote pre-release
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Promote GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail

          if ! printf '%s\n' "$RELEASE_TAG" | grep -Eq '^mono-ask-v[0-9]+[.][0-9]+[.][0-9]+-r[0-9]+$'; then
            printf '::error::Unexpected release tag format: %s\n' "$RELEASE_TAG" >&2
            exit 1
          fi

          if ! prerelease="$(gh release view "$RELEASE_TAG" --json isPrerelease --jq '.isPrerelease')"; then
            printf '::error::GitHub release does not exist for tag %s\n' "$RELEASE_TAG" >&2
            exit 1
          fi

          if [ "$prerelease" != true ]; then
            printf '::error::Release %s is not currently a pre-release; refusing to edit it\n' "$RELEASE_TAG" >&2
            exit 1
          fi

          gh release edit "$RELEASE_TAG" --prerelease=false --latest

          {
            echo "### Mono ASK release promoted"
            echo
            echo "| Item | Value |"
            echo "| --- | --- |"
            echo "| release tag | \`${RELEASE_TAG}\` |"
            echo "| release state | \`full release\` |"
          } >> "$GITHUB_STEP_SUMMARY"
