name: Nightly Build

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:
    inputs:
      cache_epoch:
        description: "Optional cache epoch override. Leave empty to use MONO_NIGHTLY_CACHE_EPOCH or v1."
        required: false
        type: string
      cold_build:
        description: "Skip restoring and saving caches for this run."
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: nightly-build
  cancel-in-progress: false

env:
  CACHE_EPOCH: ${{ inputs.cache_epoch || vars.MONO_NIGHTLY_CACHE_EPOCH || 'v1' }}
  CANDIDATE_BUNDLE: nightly-build-candidates.bundle
  CANDIDATE_ARTIFACT: nightly-build-candidates

jobs:
  prepare-candidates:
    name: Prepare candidate branches
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
    outputs:
      main_sha: ${{ steps.prepare.outputs.main_sha }}
      mono_oss_sha: ${{ steps.prepare.outputs.mono_oss_sha }}
      mono_ask_sha: ${{ steps.prepare.outputs.mono_ask_sha }}
      main_base_sha: ${{ steps.prepare.outputs.main_base_sha }}
      mono_oss_base_sha: ${{ steps.prepare.outputs.mono_oss_base_sha }}
      mono_ask_base_sha: ${{ steps.prepare.outputs.mono_ask_base_sha }}
    steps:
      - name: Check out workflow branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Verify external actions are SHA pinned
        run: |
          set -euo pipefail
          failures=0
          while IFS= read -r ref; do
            case "$ref" in
              ./*|docker://*) continue ;;
            esac

            if ! printf '%s\n' "$ref" | grep -Eq '@[0-9a-f]{40}$'; then
              printf '::error::External action is not pinned to a full commit SHA: %s\n' "$ref" >&2
              failures=1
            fi
          done < <(grep -RhoE 'uses:[[:space:]]+[^[:space:]#]+' .github/workflows/*.yml .github/workflows/*.yaml 2>/dev/null | awk '{ print $2 }')

          exit "$failures"

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Prepare local main/mono-oss/mono-ask candidates
        id: prepare
        run: NIGHTLY_BUILD_MODE=prepare bash .github/workflows/scripts/update-nightly-tracking-branches.sh

      - name: Bundle candidate refs
        run: |
          git bundle create "/tmp/${CANDIDATE_BUNDLE}" main mono-oss mono-ask
          cd /tmp
          sha256sum "${CANDIDATE_BUNDLE}" | tee "${CANDIDATE_BUNDLE}.sha256"

      - name: Upload candidate bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.CANDIDATE_ARTIFACT }}
          if-no-files-found: error
          retention-days: 1
          path: |
            /tmp/${{ env.CANDIDATE_BUNDLE }}
            /tmp/${{ env.CANDIDATE_BUNDLE }}.sha256

  build-candidate:
    name: Build mono-ask candidate
    needs: prepare-candidates
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    permissions:
      contents: read
      actions: read
    env:
      CCACHE_DIR: ${{ github.workspace }}/source/.ccache
    steps:
      - name: Check out workflow branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false
          path: workflow

      - name: Download candidate bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.CANDIDATE_ARTIFACT }}
          path: /tmp/nightly-build-candidate

      - name: Check out mono-ask candidate from bundle
        run: |
          set -euo pipefail
          cd /tmp/nightly-build-candidate
          sha256sum -c "${CANDIDATE_BUNDLE}.sha256"
          git clone "${CANDIDATE_BUNDLE}" "${GITHUB_WORKSPACE}/source"
          cd "${GITHUB_WORKSPACE}/source"
          git switch --force-create mono-ask origin/mono-ask
          test "$(git rev-parse HEAD)" = "${{ needs.prepare-candidates.outputs.mono_ask_sha }}"

      - name: Free runner disk space
        working-directory: ${{ github.workspace }}/source
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          df -h

      - name: Install OpenWrt build dependencies
        id: install-deps
        working-directory: ${{ github.workspace }}/source
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ccache \
            clang \
            flex \
            bison \
            g++ \
            gawk \
            gcc-multilib \
            g++-multilib \
            gettext \
            git \
            libelf-dev \
            libncurses5-dev \
            libssl-dev \
            python3 \
            python3-setuptools \
            rsync \
            swig \
            unzip \
            zlib1g-dev \
            file \
            wget

      - name: Restore dl cache
        id: restore-dl
        if: ${{ inputs.cold_build != true }}
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: source/dl
          key: ${{ runner.os }}-${{ runner.arch }}-openwrt-dl-${{ env.CACHE_EPOCH }}-${{ hashFiles('source/feeds.conf.default', 'source/feeds.conf') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-openwrt-dl-${{ env.CACHE_EPOCH }}-

      - name: Update feeds
        working-directory: ${{ github.workspace }}/source
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure Mono Gateway DK build
        working-directory: ${{ github.workspace }}/source
        run: |
          cp config/mono_gateway-dk.seed .config
          {
            printf 'CONFIG_CCACHE_DIR="%s/.ccache"\n' "$PWD"
            printf 'CONFIG_BUILD_LOG=y\n'
          } >> .config
          make defconfig

      - name: Cached toolchain and firmware build
        id: cached-build
        uses: ./workflow/.github/actions/mono-openwrt-cached-build
        with:
          source-dir: ${{ github.workspace }}/source
          cache-prefix: openwrt
          cache-epoch: ${{ env.CACHE_EPOCH }}
          cold-build: ${{ inputs.cold_build }}
          dl-cache-hit: ${{ steps.restore-dl.outputs.cache-hit }}
          dl-cache-primary-key: ${{ steps.restore-dl.outputs.cache-primary-key }}
          install-deps-outcome: ${{ steps.install-deps.outcome }}

      - name: Upload build logs
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mono-ask-build-logs
          if-no-files-found: warn
          retention-days: 14
          path: |
            source/.config
            source/ccache-stats.txt
            source/make-download.log
            source/make-toolchain-install.log
            source/make.log
            source/logs/**

      - name: Upload firmware artifacts
        if: ${{ always() && steps.cached-build.outputs.build-outcome == 'success' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mono-ask-firmware
          if-no-files-found: warn
          retention-days: 14
          path: |
            source/bin/targets/layerscape/armv8_64b/**

      - name: Write build summary
        if: ${{ always() }}
        run: |
          {
            echo "### mono-ask build"
            echo
            echo "| Item | Value |"
            echo "| --- | --- |"
            echo "| main candidate | \`${{ needs.prepare-candidates.outputs.main_sha }}\` |"
            echo "| mono-oss candidate | \`${{ needs.prepare-candidates.outputs.mono_oss_sha }}\` |"
            echo "| mono-ask candidate | \`${{ needs.prepare-candidates.outputs.mono_ask_sha }}\` |"
            echo "| build result | \`${{ steps.cached-build.outputs.build-outcome }}\` |"
            echo "| cache epoch | \`${CACHE_EPOCH}\` |"
            echo "| cold build | \`${{ inputs.cold_build == true }}\` |"
            echo "| dl cache | \`${{ steps.cached-build.outputs.dl-state }}\` |"
            echo "| ccache | \`${{ steps.cached-build.outputs.ccache-state }}\` |"
            echo "| staging_dir/host | \`${{ steps.cached-build.outputs.host-state }}\` |"
            echo "| staging_dir/hostpkg | \`${{ steps.cached-build.outputs.hostpkg-state }}\` |"
            echo "| staging_dir/toolchain-* | \`${{ steps.cached-build.outputs.toolchain-state }}\` |"
            echo "| toolchain install | \`${{ steps.cached-build.outputs.toolchain-elapsed-seconds }}s, ${{ steps.cached-build.outputs.toolchain-rebuild-count }} rebuilds\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  publish-branches:
    name: Publish main/mono-oss/mono-ask
    needs:
      - prepare-candidates
      - build-candidate
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      actions: read
      contents: read
    steps:
      - name: Check out workflow branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: workflow-source
          persist-credentials: false

      - name: Download candidate bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.CANDIDATE_ARTIFACT }}
          path: /tmp/nightly-build-candidate

      - name: Check out candidate refs from bundle
        run: |
          set -euo pipefail
          cd /tmp/nightly-build-candidate
          sha256sum -c "${CANDIDATE_BUNDLE}.sha256"
          git clone "${CANDIDATE_BUNDLE}" "${GITHUB_WORKSPACE}/source"
          cd "${GITHUB_WORKSPACE}/source"
          git switch --force-create main origin/main
          git switch --force-create mono-oss origin/mono-oss
          git switch --force-create mono-ask origin/mono-ask
          test "$(git rev-parse main)" = "${{ needs.prepare-candidates.outputs.main_sha }}"
          test "$(git rev-parse mono-oss)" = "${{ needs.prepare-candidates.outputs.mono_oss_sha }}"
          test "$(git rev-parse mono-ask)" = "${{ needs.prepare-candidates.outputs.mono_ask_sha }}"
          git merge-base --is-ancestor main mono-oss
          git merge-base --is-ancestor mono-oss mono-ask

      - name: Generate publish token
        id: publish-token
        working-directory: ${{ github.workspace }}/workflow-source
        env:
          GITHUB_APP_ID: ${{ secrets.MONO_NIGHTLY_PUBLISH_APP_ID }}
          GITHUB_APP_PRIVATE_KEY: ${{ secrets.MONO_NIGHTLY_PUBLISH_APP_PRIVATE_KEY }}
        run: .github/workflows/scripts/generate-github-app-token.sh

      - name: Configure authenticated origin
        working-directory: ${{ github.workspace }}/source
        env:
          GITHUB_TOKEN: ${{ steps.publish-token.outputs.token }}
        run: |
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --prune origin '+refs/heads/*:refs/remotes/origin/*'
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Publish main/mono-oss/mono-ask
        id: publish
        working-directory: ${{ github.workspace }}/source
        env:
          MAIN_BASE_SHA: ${{ needs.prepare-candidates.outputs.main_base_sha }}
          MONO_OSS_BASE_SHA: ${{ needs.prepare-candidates.outputs.mono_oss_base_sha }}
          MONO_ASK_BASE_SHA: ${{ needs.prepare-candidates.outputs.mono_ask_base_sha }}
        run: NIGHTLY_BUILD_MODE=publish bash .github/workflows/scripts/update-nightly-tracking-branches.sh
