name: Nightly Next Branch Build

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:
    inputs:
      cache_epoch:
        description: "Optional cache epoch override. Leave empty to use MONO_NIGHTLY_CACHE_EPOCH or v1."
        required: false
        type: string
      cold_build:
        description: "Skip restoring and saving caches for this run."
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: nightly-next
  cancel-in-progress: false

env:
  CACHE_EPOCH: ${{ inputs.cache_epoch || vars.MONO_NIGHTLY_CACHE_EPOCH || 'v1' }}

jobs:
  nightly-next:
    name: Rebase, build, and publish next branches
    runs-on: ubuntu-24.04
    timeout-minutes: 390
    permissions:
      contents: write
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
    steps:
      - name: Check out workflow branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Prepare main and local next branches
        id: prepare
        run: NIGHTLY_NEXT_MODE=prepare bash .github/workflows/scripts/update-nightly-tracking-branches.sh

      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          df -h

      - name: Install OpenWrt build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ccache \
            clang \
            flex \
            bison \
            g++ \
            gawk \
            gcc-multilib \
            g++-multilib \
            gettext \
            git \
            libelf-dev \
            libncurses5-dev \
            libssl-dev \
            python3 \
            python3-setuptools \
            rsync \
            swig \
            unzip \
            zlib1g-dev \
            file \
            wget

      - name: Restore dl cache
        id: restore-dl
        if: ${{ inputs.cold_build != true }}
        uses: actions/cache/restore@v4
        with:
          path: dl
          key: ${{ runner.os }}-${{ runner.arch }}-openwrt-dl-${{ env.CACHE_EPOCH }}-${{ hashFiles('feeds.conf.default', 'feeds.conf') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-openwrt-dl-${{ env.CACHE_EPOCH }}-

      - name: Update feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure Mono Gateway DK build
        run: |
          cp config/mono_gateway-dk.seed .config
          cat >> .config <<'EOF'
          CONFIG_DEVEL=y
          CONFIG_CCACHE=y
          CONFIG_CCACHE_DIR=".ccache"
          CONFIG_BUILD_LOG=y
          EOF
          make defconfig

      - name: Compute cache keys
        id: cache-keys
        env:
          CACHE_PREFIX: ${{ runner.os }}-${{ runner.arch }}-openwrt
        run: |
          set -euo pipefail

          git_tree_hash() {
            local path
            for path in "$@"; do
              git rev-parse "HEAD:${path}" 2>/dev/null || true
            done | sha256sum | cut -d ' ' -f1
          }

          feed_revision_hash() {
            if [ ! -d feeds ]; then
              printf 'nofeeds\n'
              return
            fi

            find feeds -mindepth 1 -maxdepth 1 -type d -print | sort | while read -r feed; do
              if [ -d "${feed}/.git" ]; then
                printf '%s %s\n' "${feed}" "$(git -C "${feed}" rev-parse HEAD)"
              else
                printf '%s nogit\n' "${feed}"
              fi
            done | sha256sum | cut -d ' ' -f1
          }

          config_hash="$(sha256sum .config | cut -d ' ' -f1)"
          feed_hash="$(feed_revision_hash)"
          host_tree_hash="$(git_tree_hash Makefile Config.in rules.mk include scripts tools)"
          hostpkg_tree_hash="$(git_tree_hash Makefile Config.in rules.mk include package)"
          toolchain_tree_hash="$(git_tree_hash Makefile Config.in rules.mk include toolchain target/linux/layerscape config/mono_gateway-dk.seed)"
          ccache_family="${CACHE_PREFIX}-ccache-${CACHE_EPOCH}-${toolchain_tree_hash}-${config_hash}"
          ccache_week="$(date -u +%G-W%V)"

          {
            printf 'ccache_key=%s-week-%s\n' "$ccache_family" "$ccache_week"
            printf 'ccache_save_key=%s-week-%s\n' "$ccache_family" "$ccache_week"
            printf 'ccache_restore_family=%s-week-\n' "$ccache_family"
            printf 'host_key=%s-host-%s-%s-%s\n' "$CACHE_PREFIX" "$CACHE_EPOCH" "$host_tree_hash" "$config_hash"
            printf 'hostpkg_key=%s-hostpkg-%s-%s-%s-%s\n' "$CACHE_PREFIX" "$CACHE_EPOCH" "$hostpkg_tree_hash" "$feed_hash" "$config_hash"
            printf 'toolchain_key=%s-toolchain-%s-%s-%s\n' "$CACHE_PREFIX" "$CACHE_EPOCH" "$toolchain_tree_hash" "$config_hash"
          } >> "$GITHUB_OUTPUT"

      - name: Restore ccache
        id: restore-ccache
        if: ${{ inputs.cold_build != true }}
        uses: actions/cache/restore@v4
        with:
          path: .ccache
          key: ${{ steps.cache-keys.outputs.ccache_key }}
          restore-keys: |
            ${{ steps.cache-keys.outputs.ccache_restore_family }}

      - name: Restore staging_dir/host cache
        id: restore-host
        if: ${{ inputs.cold_build != true }}
        uses: actions/cache/restore@v4
        with:
          path: staging_dir/host
          key: ${{ steps.cache-keys.outputs.host_key }}

      - name: Restore staging_dir/hostpkg cache
        id: restore-hostpkg
        if: ${{ inputs.cold_build != true }}
        uses: actions/cache/restore@v4
        with:
          path: staging_dir/hostpkg
          key: ${{ steps.cache-keys.outputs.hostpkg_key }}

      - name: Restore staging_dir/toolchain cache
        id: restore-toolchain
        if: ${{ inputs.cold_build != true }}
        uses: actions/cache/restore@v4
        with:
          path: staging_dir/toolchain-*
          key: ${{ steps.cache-keys.outputs.toolchain_key }}

      - name: Configure ccache limit
        run: ccache --set-config=max_size=5G

      - name: Download sources
        run: |
          set -o pipefail
          make download -j"$(nproc)" 2>&1 | tee make-download.log

      - name: Save dl cache
        if: ${{ inputs.cold_build != true && steps.restore-dl.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v4
        with:
          path: dl
          key: ${{ steps.restore-dl.outputs.cache-primary-key }}

      - name: Build firmware
        id: build
        run: |
          set -o pipefail
          make -j"$(nproc)" 2>&1 | tee make.log

      - name: Publish next branches
        id: publish
        run: NIGHTLY_NEXT_MODE=publish bash .github/workflows/scripts/update-nightly-tracking-branches.sh

      - name: Save ccache
        if: ${{ success() && inputs.cold_build != true && steps.restore-ccache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v4
        with:
          path: .ccache
          key: ${{ steps.cache-keys.outputs.ccache_save_key }}

      - name: Save staging_dir/host cache
        if: ${{ success() && inputs.cold_build != true && steps.restore-host.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v4
        with:
          path: staging_dir/host
          key: ${{ steps.cache-keys.outputs.host_key }}

      - name: Save staging_dir/hostpkg cache
        if: ${{ success() && inputs.cold_build != true && steps.restore-hostpkg.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v4
        with:
          path: staging_dir/hostpkg
          key: ${{ steps.cache-keys.outputs.hostpkg_key }}

      - name: Save staging_dir/toolchain cache
        if: ${{ success() && inputs.cold_build != true && steps.restore-toolchain.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v4
        with:
          path: staging_dir/toolchain-*
          key: ${{ steps.cache-keys.outputs.toolchain_key }}

      - name: Upload build logs
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: mono-ask-next-build-logs
          if-no-files-found: warn
          retention-days: 14
          path: |
            .config
            make-download.log
            make.log
            logs/**

      - name: Upload firmware artifacts
        if: ${{ always() && steps.build.outcome == 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: mono-ask-next-firmware
          if-no-files-found: warn
          retention-days: 14
          path: |
            bin/targets/layerscape/armv8_64b/**

      - name: Write build summary
        if: ${{ always() }}
        run: |
          {
            echo "### mono-ask-next build"
            echo
            echo "| Item | Value |"
            echo "| --- | --- |"
            echo "| main | \`${{ steps.prepare.outputs.main_sha }}\` |"
            echo "| mono-oss-next | \`${{ steps.prepare.outputs.mono_oss_next_sha }}\` |"
            echo "| mono-ask-next | \`${{ steps.prepare.outputs.mono_ask_next_sha }}\` |"
            echo "| build result | \`${{ steps.build.outcome }}\` |"
            echo "| publish result | \`${{ steps.publish.outcome }}\` |"
            echo "| cache epoch | \`${CACHE_EPOCH}\` |"
            echo "| cold build | \`${{ inputs.cold_build == true }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
